<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplicação</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./javascript/index.js"></script>
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/header.css">
  <script src="./javascript/header.js"></script>
</head>

<body>
 <header class="header">
    <div class="header-left d-md-none">
      <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>      
    </div>
    <div class="header-content">
        <div><a href="/index.html">Home</a></div>
        <div><a href="/produtos.html">Produtos</a></div>
      </div>

    <div class="header-right">
      <a href="/">Acessar Sistema</a>
    </div>
  </header>
  
  <nav class="mobile-menu" id="mobileMenu">
    <a href="/index.html">Home</a>
    <a href="/produtos.html">Produtos</a>
    <a href="/">Sistema</a>
  </nav>

  <div class="container">

    <div class="produtos-wrapper">

      <div class="produtos-card">

        <h2>Cadastro de Produtos</h2>

        <div class="produtos-filtro">
          <label>Nome do Produto:</label>
          <input type="text" id="inputBuscaProduto">
          <button class="btn btn-info px-md-4 text-white" id="btnProcurar">Procurar</button>
          <button class="btn btn-secondary px-md-4" id="btnLimpar">Limpar</button>
        </div>
       
        <section>
          <table class="table" id="tb_produtos">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nome do Produto</th>
                <th>Valor</th>
                <th colspan="2">Ações</th>
              </tr>
            </thead>
            <tbody>

            </tbody>
          </table>
        </section>

        <div class="produtos-footer">
          <div class="btn btn-primary px-5" data-bs-toggle="modal" data-bs-target="#modalNovoProduto">
            Novo Produto
          </div>
        </div>

      </div>
    </div>

    <!-- Modal Novo Produto -->
     <div id="modalNovoProdutoContainer"></div>   

    <!-- Modal Editar Produto --> 
    <div id="modalAlterarContainer"></div>

    <!-- Modal Excluir Produto -->
    <div id="modalExcluirContainer"></div>

    <div id="modalAlterarContainer"></div>
    <div id="modalExcluirContainer"></div>
    <div id="modalSucessoContainer"></div>
  </div>
</body>

</html>

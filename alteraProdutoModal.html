<!-- Modal Editar Produto -->
<div class="modal fade" id="modalEditarProduto" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Produto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editId">

        <label>Nome do Produto:</label>
        <input id="editNome" type="text" class="form-control mb-3">

        <label>Valor do Produto:</label>
        <input id="editValor" type="number" step="0.01" class="form-control">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="alterarProduto()">Salvar</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

<!-- Modal Excluir Produto -->
<div class="modal fade" id="modalExcluirProduto" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">Excluir Produto</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="excluirId">

        <p>Deseja mesmo excluir o produto abaixo?</p>

        <div class="border rounded p-3 bg-light">
          <p><strong>ID:</strong> <span id="excluirIdLabel"></span></p>
          <p><strong>Nome:</strong> <span id="excluirNomeLabel"></span></p>
          <p><strong>Valor:</strong> R$ <span id="excluirValorLabel"></span></p>
        </div>

        <p class="text-danger mt-3">
          Esta ação não pode ser desfeita.
        </p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarExclusao()">Excluir</button>
      </div>

    </div>
  </div>
</div>
